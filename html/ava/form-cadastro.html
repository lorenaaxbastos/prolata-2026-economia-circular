    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // --- LÓGICA DO GÊNERO ---
        const selectGenero = document.getElementById(
          "id_profile_field_324_genero",
        );
        const groupGeneroOutro = document.getElementById("grupo_genero_outro");
        const inputGeneroOutro = document.getElementById(
          "id_profile_field_324_genero_outro",
        );

        if (selectGenero) {
          selectGenero.addEventListener("change", function () {
            if (this.value === "outro") {
              groupGeneroOutro.style.display = "block";
              inputGeneroOutro.setAttribute("required", "required");
            } else {
              groupGeneroOutro.style.display = "none";
              inputGeneroOutro.removeAttribute("required");
              inputGeneroOutro.value = "";
            }
          });
        }

        // --- LÓGICA DO COMO FICOU SABENDO ---
        const selectSabendo = document.getElementById(
          "id_profile_field_324_como_sabendo",
        );
        const groupSabendoOutro = document.getElementById(
          "grupo_como_sabendo_outro",
        );

        const inputSabendoOutro = document.getElementById(
          "id_profile_field_324_como_sabendo_outro",
        );

        if (selectSabendo) {
          selectSabendo.addEventListener("change", function () {
            if (this.value === "outros") {
              groupSabendoOutro.style.display = "block";
              inputSabendoOutro.setAttribute("required", "required");
            } else {
              groupSabendoOutro.style.display = "none";
              inputSabendoOutro.removeAttribute("required");
              inputSabendoOutro.value = "";
            }
          });
        }

        // --- LÓGICA DE ADICIONAR E REMOVER ESCOLAS ---
        const btnAddEscola = document.getElementById("btn-add-escola");
        const escolasContainer = document.getElementById("container-schools");

        function reordenarEscolas() {
          const blocos = document.querySelectorAll(".block-school");

          blocos.forEach((bloco, index) => {
            const numEscola = index + 1;

            bloco.id = `block-school-${numEscola}`;
            const titulo = bloco.querySelector(".titulo-escola");
            if (titulo) {
              titulo.innerText = `Escola ${numEscola}`;
            }

            const elements = bloco.querySelectorAll("input, select");
            elements.forEach((el) => {
              if (el.id) {
                let baseId = el.id.replace(/-\d+$/, "");
                el.id = `${baseId}-${numEscola}`;
              }
              if (el.name) {
                let baseName = el.name.replace(/-\d+$/, "");
                el.name = `${baseName}-${numEscola}`;
              }
            });

            const labels = bloco.querySelectorAll("label[for]");
            labels.forEach((label) => {
              const originalFor = label.getAttribute("for");
              if (originalFor) {
                let baseFor = originalFor.replace(/-\d+$/, "");
                label.setAttribute("for", `${baseFor}-${numEscola}`);
              }
            });
          });
        }

        if (btnAddEscola && escolasContainer) {
          btnAddEscola.addEventListener("click", function () {
            const blockToClone = document.getElementById("block-school-1");
            const newBlock = blockToClone.cloneNode(true);

            const elements = newBlock.querySelectorAll("input, select");
            elements.forEach((el) => {
              if (el.type === "checkbox" || el.type === "radio") {
                el.checked = false;
              } else {
                el.value = "";
              }
            });

            const separador = document.createElement("hr");
            separador.style.margin = "32px 0 24px 0";
            separador.style.borderTop = "2px solid #eaeaea";
            newBlock.insertBefore(separador, newBlock.firstChild);

            const btnRemove = newBlock.querySelector(
              ".prolata-2026-button--remove-school",
            );
            if (btnRemove) {
              btnRemove.style.display = "block";
              btnRemove.addEventListener("click", function () {
                newBlock.remove();
                reordenarEscolas();
              });
            }

            escolasContainer.appendChild(newBlock);

            reordenarEscolas();
          });
        }
      });
    </script>
