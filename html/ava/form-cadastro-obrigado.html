<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prolata - Cadastro realizado com sucesso</title>
    <link rel="stylesheet" href="../../css/main.css" />
  </head>
  <body class="enroll-thank-you">
    <main>
      <div>
        <h1 class="prolata-2026-heading prolata-2026-heading--primary">
          Cadastro realizado com <span>sucesso</span>!
        </h1>

        <p class="prolata-2026-text">
          Estamos muito felizes com seu interesse em participar do curso
          Economia Circular.
        </p>
        <p class="prolata-2026-text">
          Em breve você receberá um e-mail com mais informações sobre o
          lançamento do curso.
        </p>

        <div class="box-highlight">
          <h2 class="prolata-2026-heading prolata-2026-heading--secondary">
            SALVE A DATA
          </h2>

          <p class="prolata-2026-text">
            O curso será lançado dia 18/05!
            <span class="prolata-2026-text--highlight">Até breve!</span>
          </p>
        </div>
      </div>
      <div>
        <img
          class="logos"
          src="../../assets/logos.png"
          alt="Régua de logos com as logos da Abeaço, Prolata e Sincroniza Educação"
        />
      </div>

      <img
        class="detail"
        src="../../assets/hand-holding-can.png"
        alt="Mão feminina segurando uma lata de aço"
      />
    </main>
  </body>
</html>
